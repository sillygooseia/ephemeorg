apiVersion: v1
kind: Service
metadata:
  name: {{ include "ephemeorg.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "ephemeorg.name" . }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: {{ include "ephemeorg.name" . }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.service.port | int }}
      targetPort: {{ .Values.service.port | int }}
