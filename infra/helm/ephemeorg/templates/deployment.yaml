apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ephemeorg.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "ephemeorg.name" . }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ephemeorg.name" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ephemeorg.name" . }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port | int }}
          env:
            - name: PORT
              value: {{ .Values.env.PORT | quote }}
            {{- if .Values.env.REDIS_URL }}
            - name: REDIS_URL
              value: {{ .Values.env.REDIS_URL | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port | int }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port | int }}
            initialDelaySeconds: 20
            periodSeconds: 20
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
